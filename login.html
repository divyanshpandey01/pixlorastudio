<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixlora Studio — Authorisation Portal</title>
  <meta name="description" content="Access your Pixlora Studio account. Managed galleries, AI face search, and event deliveries.">
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23D4AF37'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='%231A2530' font-family='serif' font-size='20' font-weight='bold'>P</text></svg>" type="image/svg+xml" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy:        #1A2530;
      --navy-light:  #243345;
      --navy-dark:   #111a23;
      --gold:        #D4AF37;
      --gold-light:  #E8CC6E;
      --gold-dark:   #B8941F;
      --white:       #FFFFFF;
      --off-white:   #F5F3EF;
      --gray-200:    #C9C5BD;
      --gray-300:    #9E9A92;
      --radius-md:   1rem;
      --radius-lg:   1.5rem;
      --radius-full: 9999px;
      --font-sans:   'Inter', system-ui, -apple-system, sans-serif;
      --font-serif:  'Playfair Display', Georgia, serif;
      --ease-out:    cubic-bezier(.25,.46,.45,.94);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--navy);
      color: var(--off-white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    /* Background image with overlay */
    .bg-overlay {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: url('assets/images/hero-bg.webp') center/cover no-repeat;
      opacity: 0.18;
      filter: saturate(0.7);
    }

    .bg-gradient {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: radial-gradient(circle at center, transparent 30%, var(--navy-dark) 100%);
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 440px;
      padding: 1.5rem;
    }

    /* Back button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--gray-200);
      font-size: 0.88rem;
      text-decoration: none;
      margin-bottom: 2rem;
      transition: color 0.3s;
    }

    .back-btn:hover {
      color: var(--gold);
    }

    /* Main Auth Card */
    .auth-card {
      background: rgba(36, 51, 69, 0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 40px rgba(212, 175, 55, 0.05);
    }

    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-img {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid rgba(212, 175, 55, 0.45);
      margin-bottom: 0.5rem;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.25);
      transition: transform 0.3s var(--ease-out);
    }

    .logo-img:hover {
      transform: scale(1.05) rotate(15deg);
    }

    .logo-title {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 600;
    }

    .logo-title span {
      color: var(--gold);
    }

    /* Auth Views Toggle */
    .auth-view {
      display: none;
    }

    .auth-view.active {
      display: block;
      animation: fadeIn 0.4s var(--ease-out);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .view-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    /* Form Fields */
    .form-group {
      position: relative;
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--gray-200);
      margin-bottom: 0.4rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: var(--white);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s;
    }

    .form-group input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
    }

    /* Helper Utilities */
    .form-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      font-size: 0.8rem;
    }

    .forgot-link, .toggle-view-btn {
      color: var(--gold);
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      font-size: 0.8rem;
      font-family: inherit;
    }

    .forgot-link:hover, .toggle-view-btn:hover {
      color: var(--gold-light);
      text-decoration: underline;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.85rem;
      border-radius: var(--radius-full);
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.3s var(--ease-out);
      border: none;
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: var(--navy-dark);
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(212, 175, 55, 0.45);
    }

    .btn-social {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--off-white);
      margin-top: 0.5rem;
      gap: 0.65rem;
    }

    .btn-social:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 1.5rem 0;
      font-size: 0.75rem;
      color: var(--gray-300);
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .divider:not(:empty)::before { margin-right: .75rem; }
    .divider:not(:empty)::after { margin-left: .75rem; }

    /* Messages & Feedback */
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.82rem;
      margin-bottom: 1.25rem;
      display: none;
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #FCA5A5;
    }

    .alert-success {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #A7F3D0;
    }

    .footer-note {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--gray-300);
    }
  </style>
</head>
<body>

  <div class="bg-overlay"></div>
  <div class="bg-gradient"></div>

  <div class="container">
    <a href="index.html" class="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to Website
    </a>

    <div class="auth-card">
      <div class="logo-area">
        <img src="assets/images/logo-icon.webp" alt="Pixlora Studio Logo" class="logo-img" />
        <div class="logo-title">Pixlora <span>Studio</span></div>
      </div>

      <!-- Error / Success Alerts -->
      <div id="alert-error" class="alert alert-error"></div>
      <div id="alert-success" class="alert alert-success"></div>

      <!-- VIEW 1: SIGN IN -->
      <div id="view-signin" class="auth-view active">
        <h2 class="view-title">Welcome Back</h2>
        <form id="form-signin">
          <div class="form-group">
            <label for="signin-email">Email Address</label>
            <input type="email" id="signin-email" required placeholder="name@studio.com">
          </div>
          <div class="form-group">
            <label for="signin-password">Password</label>
            <input type="password" id="signin-password" required placeholder="••••••••">
          </div>
          <div class="form-actions">
            <span class="forgot-link" onclick="switchView('forgot')">Forgot password?</span>
          </div>
          <button type="submit" class="btn btn-primary">Sign In</button>
        </form>

        <div class="divider">or continue with</div>

        <button id="btn-google-signin" class="btn btn-social">
          <!-- Google Icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/></svg>
          Google
        </button>

        <div class="footer-note">
          Don't have an account? <span class="toggle-view-btn" onclick="switchView('signup')">Sign Up</span>
        </div>
      </div>

      <!-- VIEW 2: SIGN UP -->
      <div id="view-signup" class="auth-view">
        <h2 class="view-title">Create Account</h2>
        <form id="form-signup">
          <div class="form-group">
            <label for="signup-name">Full Name</label>
            <input type="text" id="signup-name" required placeholder="Rajesh Sharma">
          </div>
          <div class="form-group">
            <label for="signup-studio">Studio Name</label>
            <input type="text" id="signup-studio" required placeholder="MomentCraft Studio">
          </div>
          <div class="form-group">
            <label for="signup-email">Email Address</label>
            <input type="email" id="signup-email" required placeholder="name@studio.com">
          </div>
          <div class="form-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" required placeholder="Minimum 6 characters">
          </div>
          <button type="submit" class="btn btn-primary">Sign Up</button>
        </form>

        <div class="footer-note">
          Already have an account? <span class="toggle-view-btn" onclick="switchView('signin')">Sign In</span>
        </div>
      </div>

      <!-- VIEW 3: FORGOT PASSWORD -->
      <div id="view-forgot" class="auth-view">
        <h2 class="view-title">Reset Password</h2>
        <form id="form-forgot">
          <div class="form-group">
            <label for="forgot-email">Email Address</label>
            <input type="email" id="forgot-email" required placeholder="name@studio.com">
          </div>
          <button type="submit" class="btn btn-primary">Send Reset Link</button>
        </form>

        <div class="footer-note">
          Remember your password? <span class="toggle-view-btn" onclick="switchView('signin')">Sign In</span>
        </div>
      </div>

    </div>
  </div>

  <!-- Firebase Connection Script Module -->
  <script type="module">
    // ════════════════════════════════════════════════════════════
    // FIREBASE SDK INITIALISATION & CODE INTEGRATION
    // ════════════════════════════════════════════════════════════
    import { auth, isConfigured as isFirebaseConfigured } from "./firebase-config.js";
    import { 
      signInWithEmailAndPassword, 
      createUserWithEmailAndPassword, 
      sendPasswordResetEmail, 
      signInWithPopup, 
      GoogleAuthProvider,
      updateProfile,
      sendEmailVerification,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Helper functions for alerts UI
    const showError = (msg) => {
      const el = document.getElementById('alert-error');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('alert-success').style.display = 'none';
    };

    const showSuccess = (msg) => {
      const el = document.getElementById('alert-success');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('alert-error').style.display = 'none';
    };

    const clearAlerts = () => {
      document.getElementById('alert-error').style.display = 'none';
      document.getElementById('alert-success').style.display = 'none';
    };

    // Firebase Auth Action Handlers
    
    // 1. Sign In
    document.getElementById('form-signin').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlerts();
      
      const email = document.getElementById('signin-email').value;
      const password = document.getElementById('signin-password').value;

      if (!isFirebaseConfigured) {
        showError("Firebase configuration not found. Please paste your Firebase Config details into login.html.");
        return;
      }

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        // Enforce email verification check
        if (!user.emailVerified) {
          await signOut(auth);
          showError("Please verify your email address before signing in. We sent a verification link to your Gmail (Check Inbox/Spam folder).");
          return;
        }

        showSuccess("Authentication successful! Redirecting...");
        setTimeout(() => { window.location.href = "index.html"; }, 1500);
      } catch (error) {
        showError(error.message);
      }
    });

    // 2. Sign Up
    document.getElementById('form-signup').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlerts();

      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const studio = document.getElementById('signup-studio').value;

      if (!isFirebaseConfigured) {
        showError("Firebase configuration not found. Please paste your Firebase Config details into login.html.");
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        // Update user display profile
        await updateProfile(user, { displayName: name });
        
        // Send email verification link
        await sendEmailVerification(user);
        
        // Sign out immediately so they must verify
        await signOut(auth);

        // Success feedback
        showSuccess("Account created! We've sent a verification link to your Gmail. Please click the link to verify your email, then Sign In.");
        
        // Optionally save the studio name parameter to Firestore database here
        console.log("Account created for studio:", studio);

        setTimeout(() => { switchView('signin'); }, 5000);
      } catch (error) {
        showError(error.message);
      }
    });

    // 3. Password Reset
    document.getElementById('form-forgot').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlerts();

      const email = document.getElementById('forgot-email').value;

      if (!isFirebaseConfigured) {
        showError("Firebase configuration not found. Please paste your Firebase Config details into login.html.");
        return;
      }

      try {
        await sendPasswordResetEmail(auth, email);
        showSuccess("Password reset instructions sent to " + email);
      } catch (error) {
        showError(error.message);
      }
    });

    // 4. Google Sign In
    document.getElementById('btn-google-signin').addEventListener('click', async () => {
      clearAlerts();

      if (!isFirebaseConfigured) {
        showError("Firebase configuration not found. Please paste your Firebase Config details into login.html.");
        return;
      }

      const provider = new GoogleAuthProvider();
      try {
        const result = await signInWithPopup(auth, provider);
        showSuccess("Authenticated with Google! Redirecting...");
        setTimeout(() => { window.location.href = "index.html"; }, 1500);
      } catch (error) {
        showError(error.message);
      }
    });

    // Handle Auth View toggling globally
    window.switchView = (view) => {
      clearAlerts();
      document.querySelectorAll('.auth-view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + view).classList.add('active');
    };
  </script>
</body>
</html>
