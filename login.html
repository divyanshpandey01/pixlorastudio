<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    (function() {
      const storedTheme = localStorage.getItem('pixlora-theme');
      if (storedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
      } else if (storedTheme === 'dark') {
        document.documentElement.classList.remove('light-theme');
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
        document.documentElement.classList.add('light-theme');
      }
    })();
  </script>
  <title>Pixlora Studio — Authorisation Portal</title>
  <meta name="description" content="Access your Pixlora Studio account. Managed galleries, AI face search, and event deliveries.">
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23D4AF37'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='%231A2530' font-family='serif' font-size='20' font-weight='bold'>P</text></svg>" type="image/svg+xml" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy:        #1A2530;
      --navy-light:  #243345;
      --navy-dark:   #111a23;
      --gold:        #D4AF37;
      --gold-light:  #E8CC6E;
      --gold-dark:   #B8941F;
      --white:       #FFFFFF;
      --off-white:   #F5F3EF;
      --gray-200:    #C9C5BD;
      --gray-300:    #9E9A92;
      --radius-md:   1rem;
      --radius-lg:   1.5rem;
      --radius-full: 9999px;
      --font-sans:   'Inter', system-ui, -apple-system, sans-serif;
      --font-serif:  'Playfair Display', Georgia, serif;
      --ease-out:    cubic-bezier(.25,.46,.45,.94);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--navy);
      color: var(--off-white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    /* Background image with overlay */
    .bg-overlay {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: url('assets/images/hero-bg.webp') center/cover no-repeat;
      opacity: 0.18;
      filter: saturate(0.7);
    }

    .bg-gradient {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: radial-gradient(circle at center, transparent 30%, var(--navy-dark) 100%);
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 440px;
      padding: 1.5rem;
    }

    /* Back button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--gray-200);
      font-size: 0.88rem;
      text-decoration: none;
      margin-bottom: 2rem;
      transition: color 0.3s;
    }

    .back-btn:hover {
      color: var(--gold);
    }

    /* Main Auth Card */
    .auth-card {
      background: rgba(36, 51, 69, 0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 40px rgba(212, 175, 55, 0.05);
    }

    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-img {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid rgba(212, 175, 55, 0.45);
      margin-bottom: 0.5rem;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.25);
      transition: transform 0.3s var(--ease-out);
    }

    .logo-img:hover {
      transform: scale(1.05) rotate(15deg);
    }

    .logo-title {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 600;
    }

    .logo-title span {
      color: var(--gold);
    }

    /* Auth Views Toggle */
    .auth-view {
      display: none;
    }

    .auth-view.active {
      display: block;
      animation: fadeIn 0.4s var(--ease-out);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .view-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    /* Form Fields */
    .form-group {
      position: relative;
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--gray-200);
      margin-bottom: 0.4rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: var(--white);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s;
    }

    .form-group input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
    }

    /* Helper Utilities */
    .form-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      font-size: 0.8rem;
    }

    .forgot-link, .toggle-view-btn {
      color: var(--gold);
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      font-size: 0.8rem;
      font-family: inherit;
    }

    .forgot-link:hover, .toggle-view-btn:hover {
      color: var(--gold-light);
      text-decoration: underline;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.85rem;
      border-radius: var(--radius-full);
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.3s var(--ease-out);
      border: none;
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: var(--navy-dark);
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(212, 175, 55, 0.45);
    }

    .btn-social {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--off-white);
      margin-top: 0.5rem;
      gap: 0.65rem;
    }

    .btn-social:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 1.5rem 0;
      font-size: 0.75rem;
      color: var(--gray-300);
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .divider:not(:empty)::before { margin-right: .75rem; }
    .divider:not(:empty)::after { margin-left: .75rem; }

    /* Messages & Feedback */
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.82rem;
      margin-bottom: 1.25rem;
      display: none;
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #FCA5A5;
    }

    .alert-success {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #A7F3D0;
    }

    .footer-note {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--gray-300);
    }

    /* ═══════════ DARK/LIGHT THEME TRANSITIONS & OVERRIDES ═══════════ */
    body, body *, div, a, button, input {
      transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
    }

    /* Theme Switcher Button Style */
    .theme-toggle {
      background: none; border: none; cursor: pointer; color: var(--gray-200);
      display: inline-flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; border-radius: 50%; transition: all 0.3s;
      border: 1px solid rgba(255,255,255,.05); background: rgba(255,255,255,.02);
    }
    .theme-toggle:hover {
      color: var(--gold); border-color: rgba(212,175,55,.3); background: rgba(212,175,55,.05);
      transform: scale(1.05);
    }
    .theme-toggle svg { width: 20px; height: 20px; fill: currentColor; }

    /* Show/hide sun/moon based on theme */
    .sun-icon { display: none; }
    .moon-icon { display: block; }
    .light-theme .sun-icon { display: block; }
    .light-theme .moon-icon { display: none; }

    /* Light Theme Variables */
    body.light-theme {
      --navy: #FFFFFF;
      --navy-light: #F3F4F6;
      --navy-dark: #EBF0F5;
      --white: #111A23;
      --off-white: #111827;
      --gray-200: #374151;
      --gray-300: #4B5563;
      --bg: var(--navy);
    }

    /* Light Theme Specific Element Overrides */
    body.light-theme .theme-toggle {
      border-color: rgba(0,0,0,.08); background: rgba(0,0,0,.02); color: #4B5563;
    }
    body.light-theme .theme-toggle:hover {
      color: var(--gold); border-color: rgba(212,175,55,.3); background: rgba(212,175,55,.03);
    }
    body.light-theme .bg-overlay {
      opacity: 0.08;
    }
    body.light-theme .bg-gradient {
      background: radial-gradient(circle at center, transparent 30%, #EBF0F5 100%);
    }
    body.light-theme .auth-card {
      background: rgba(243, 244, 246, 0.8);
      border-color: rgba(0, 0, 0, 0.08);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06), 0 0 40px rgba(212, 175, 55, 0.02);
    }
    body.light-theme .logo-title {
      color: #111A23;
    }
    body.light-theme .view-title {
      color: #111A23;
    }
    body.light-theme .form-group input {
      background: rgba(0, 0, 0, 0.03);
      border-color: rgba(0, 0, 0, 0.08);
      color: #111827;
    }
    body.light-theme .form-group input::placeholder {
      color: #6B7280;
    }
    body.light-theme .form-group input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.08);
    }
    body.light-theme .forgot-link, 
    body.light-theme .toggle-view-btn {
      color: #4B5563;
    }
    body.light-theme .btn-social {
      background: rgba(0, 0, 0, 0.03);
      border-color: rgba(0, 0, 0, 0.08);
      color: #1F2937;
    }
    body.light-theme .btn-social:hover {
      background: rgba(0, 0, 0, 0.06);
      border-color: rgba(0, 0, 0, 0.15);
    }
    body.light-theme .divider {
      color: #6B7280;
    }
    body.light-theme .divider::before,
    body.light-theme .divider::after {
      border-bottom-color: rgba(0, 0, 0, 0.08);
    }
    body.light-theme .alert-error {
      background: rgba(239, 68, 68, 0.1);
      color: #991B1B;
      border-color: rgba(239, 68, 68, 0.2);
    }
    body.light-theme .alert-success {
      background: rgba(16, 185, 129, 0.1);
      color: #065F46;
      border-color: rgba(16, 185, 129, 0.2);
    }
    body.light-theme .footer-note {
      color: #4B5563;
    }
  </style>
</head>
<body>
  <script>(function(){ if(document.documentElement.classList.contains('light-theme')) document.body.classList.add('light-theme'); })();</script>

  <div class="bg-overlay"></div>

  <div class="container">

  <!-- Firebase Connection Script Module -->
  <script type="module">
    // ════════════════════════════════════════════════════════════
    // FIREBASE SDK INITIALISATION & CODE INTEGRATION
    // ════════════════════════════════════════════════════════════
    import { auth, isConfigured as isFirebaseConfigured } from "./firebase-config.js";
    import { 
      signInWithEmailAndPassword, 
      createUserWithEmailAndPassword, 
      sendPasswordResetEmail, 
      signInWithPopup, 
      GoogleAuthProvider,
      OAuthProvider,
      updateProfile,
      sendEmailVerification,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Helper functions for alerts UI
    const showError = (msg) => {
      const el = document.getElementById('alert-error');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('alert-success').style.display = 'none';
    };

    const showSuccess = (msg) => {
      const el = document.getElementById('alert-success');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('alert-error').style.display = 'none';
    };

    const clearAlerts = () => {
      document.getElementById('alert-error').style.display = 'none';
      document.getElementById('alert-success').style.display = 'none';
    };

    // Firebase Auth Action Handlers
    
    // 1. Sign In
    document.getElementById('form-signin').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlerts();
      
      const email = document.getElementById('signin-email').value;
      const password = document.getElementById('signin-password').value;

      if (!isFirebaseConfigured) {
        showError("Firebase configuration not found. Please paste your Firebase Config details into login.html.");
        return;
      }

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        // Enforce email verification check
        if (!user.emailVerified) {
          await signOut(auth);
          showError("Please verify your email address before signing in. We sent a verification link to your Gmail (Check Inbox/Spam folder).");
          return;
        }

        showSuccess("Authentication successful! Redirecting...");
        setTimeout(() => { 
          const urlParams = `?email=${encodeURIComponent(user.email)}&name=${encodeURIComponent(user.displayName || 'Photographer')}`;
          window.location.href = "dashboard.html" + urlParams; 
        }, 1500);
      } catch (error) {
        showError(error.message);
      }
    });

    // 2. Sign Up
    document.getElementById('form-signup').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlerts();

      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const studio = document.getElementById('signup-studio').value;

      if (!isFirebaseConfigured) {
        showError("Firebase configuration not found. Please paste your Firebase Config details into login.html.");
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        // Update user display profile
        await updateProfile(user, { displayName: name });
        
        // Send email verification link
        await sendEmailVerification(user);
        
        // Sign out immediately so they must verify
        await signOut(auth);

        // Success feedback
        showSuccess("Account created! We've sent a verification link to your Gmail. Please click the link to verify your email, then Sign In.");
        
        // Optionally save the studio name parameter to Firestore database here
        console.log("Account created for studio:", studio);

        setTimeout(() => { switchView('signin'); }, 5000);
      } catch (error) {
        showError(error.message);
      }
    });

    // 3. Password Reset
    document.getElementById('form-forgot').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlerts();

      const email = document.getElementById('forgot-email').value;

      if (!isFirebaseConfigured) {
        showError("Firebase configuration not found. Please paste your Firebase Config details into login.html.");
        return;
      }

      try {
        await sendPasswordResetEmail(auth, email);
        showSuccess("Password reset instructions sent to " + email);
      } catch (error) {
        showError(error.message);
      }
    });

    // 4. Google Sign In
    document.getElementById('btn-google-signin').addEventListener('click', async () => {
      clearAlerts();

      if (!isFirebaseConfigured) {
        showError("Firebase configuration not found. Please paste your Firebase Config details into login.html.");
        return;
      }

      const provider = new GoogleAuthProvider();
      try {
        const result = await signInWithPopup(auth, provider);
        showSuccess("Authenticated with Google! Redirecting...");
        setTimeout(() => { 
          const urlParams = `?email=${encodeURIComponent(result.user.email)}&name=${encodeURIComponent(result.user.displayName || 'Photographer')}`;
          window.location.href = "dashboard.html" + urlParams; 
        }, 1500);
      } catch (error) {
        showError(error.message);
      }
    });

    // 5. Apple Sign In
    document.getElementById('btn-apple-signin').addEventListener('click', async () => {
      clearAlerts();

      if (!isFirebaseConfigured) {
        showError("Firebase configuration not found. Please paste your Firebase Config details into login.html.");
        return;
      }

      const provider = new OAuthProvider('apple.com');
      provider.addScope('email');
      provider.addScope('name');
      try {
        const result = await signInWithPopup(auth, provider);
        showSuccess("Authenticated with Apple! Redirecting...");
        setTimeout(() => { 
          const urlParams = `?email=${encodeURIComponent(result.user.email)}&name=${encodeURIComponent(result.user.displayName || 'Photographer')}`;
          window.location.href = "dashboard.html" + urlParams; 
        }, 1500);
      } catch (error) {
        showError(error.message);
      }
    });

    // Handle Auth View toggling globally
    window.switchView = (view) => {
      clearAlerts();
      document.querySelectorAll('.auth-view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + view).classList.add('active');
    };

    // Theme Toggle Handler
    const toggleBtn = document.getElementById('theme-toggle');
    const toggleTheme = () => {
      const isLight = document.body.classList.toggle('light-theme');
      document.documentElement.classList.toggle('light-theme', isLight);
      localStorage.setItem('pixlora-theme', isLight ? 'light' : 'dark');
    };
    if (toggleBtn) toggleBtn.addEventListener('click', toggleTheme);
  </script>
</body>
</html>
